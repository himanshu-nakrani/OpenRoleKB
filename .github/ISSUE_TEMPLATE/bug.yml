name: Bug report
description: Something is broken or working unexpectedly.
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: I ran the query "senior react remote EU" and got 0 results, but expected at least a few.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open https://...
        2. Type query "..."
        3. Press Enter
        4. See result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Browser console / server logs (if any)
      render: shell
  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: Chrome 130 / macOS 15
  - type: dropdown
    id: env
    attributes:
      label: Environment
      options:
        - production
        - self-hosted
        - local dev
      default: 0
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I have read the [Code of Conduct](https://github.com/himanshu-nakrani/OpenRoleKB/blob/main/CODE_OF_CONDUCT.md).
          required: true
