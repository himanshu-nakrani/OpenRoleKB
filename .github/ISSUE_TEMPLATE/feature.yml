name: Feature request
description: Suggest a new feature or improvement.
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What were you doing when you hit this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context, sketches, or links
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I have read the [Code of Conduct](https://github.com/himanshu-nakrani/OpenRoleKB/blob/main/CODE_OF_CONDUCT.md).
          required: true
